# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Kinkwrights
email: bdsm@rarebooklibrarian.org
description: >
  Welcome! This group of apprentices, known as a hand, are working individually to become skilled at<br>
  kinky rope tying. We each pledge to learn the basics of safety and knots to earn the initial rope badge. <br><br>
  
  After gaining the first Kinkwrights badge in rope, an apprentice becomes a compagnon and full member.<br>
  A compagnon is then free to work on specific skills, pledging to pursue additional badges.<br>
  Everyone is working on at least one badge. Study for a page lasts at least thirteen weeks but may take a year.<br><br><br>

  Meetings are announced on the discord server for the hand. All compagnons are welcome.<br>
  Every earned badge must be worn, in order to be eligible to vote at the meeting.
  

tagline: Perverts in training.
location: Virginia
date: true
baseurl: "/wrights" # the subpath of your site, e.g. /blog
url: "https://doktorvater.github.io" # the base hostname & protocol for your site, e.g. http://example.com
author: Doktor Vater
google_analytics: #


# Build settings
exclude: README.md
markdown: kramdown
theme: minima
gems:
  - jekyll-feed
  - jekyll-seo-tag
exclude:
  - Gemfile
  - Gemfile.lock
plugins_dir:
  - jekyll-roman
  - jekyll-seo-tag
