# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Kinkwrights
email: director@kinkwrights.org
description: >
  Members of this group work independently to increase
  their experience and improve their skills in five realms: 
  rope, impact, toys, obedience, and bondage.
  
  Advances are witnessed and marked by receiving the appropriate badges.

tagline: Perverts in training.
location: Virginia
date: true
baseurl: "/wrights" # the subpath of your site, e.g. /blog
url: "https://doktorvater.github.io" # the base hostname & protocol for your site, e.g. http://example.com
author: Kinkwrights
google_analytics: #


# Build settings
exclude: README.md
markdown: kramdown
theme: minima
gems:
  - jekyll-feed
  - jekyll-seo-tag
exclude:
  - Gemfile
  - Gemfile.lock
plugins_dir:
  - jekyll-roman
  - jekyll-seo-tag
